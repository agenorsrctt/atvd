<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Contatos</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 1rem;
        }

        .container {
            height: 50vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;

        }

        .formulario {
            display: flex;
            flex-direction: column;
            border: 3px solid black;
            width: 300px;
            justify-content: center;
            align-items: center;
            border-radius: 20px;
            box-shadow: 0px 10px 15px rgba(0, 0, 0, 0.7);
        }

        .form {
            display: grid;
            grid-template-columns: auto 2fr;
            gap: 10px;
            padding: 20px;
            margin: 10px;
        }

        .form button {
            grid-column: span 2;
            cursor: pointer;
        }

        .list {

            height: 50vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 30px;
        }

        .list li {
            display: flex;
            flex-direction: row;
            gap: 5px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="formulario">
            <h2>Lista de Contatos</h2>
            <form class="form">
                <label for="nome">Nome:</label>
                <input type="text" name="nome">
                <label for="telefone">Telefone:</label>
                <input type="tel" name="telefone">
                <button type="submit">Enviar</button>
            </form>
        </div>
    </div>

    <div class="lista">
        <ul class="list">Lista Vazia</ul>
    </div>

    <script>
        const form = document.querySelector(".form");
        const list = document.querySelector(".list");
        
        function carregarListaNavegador(){
            const getList = localStorage.getItem("lista");
            const listParse = JSON.parse(getList);
            if(listParse != null){
                return listParse
            }else{
                return [];
            }
        }

        carregarListaNavegador();

        const lista = carregarListaNavegador();

        form.addEventListener("submit", event => {
            event.preventDefault();

            const novoContato = {
                nome: event.target.nome.value,
                telefone: event.target.telefone.value
            }

            lista.push(novoContato);

            localStorage.setItem("lista", JSON.stringify(lista));
            carregarLista();
        })

        function carregarLista() {
            list.innerHTML = "";
            
            lista.forEach((contato, indice) => {
                const li = document.createElement("li");
                const editar = document.createElement("button");
                const excluir = document.createElement("button");

                editar.textContent = "Editar";
                excluir.textContent = "Excluir";
                li.textContent = `Nome: ${contato.nome} | Telefone: ${contato.telefone}`

                excluir.addEventListener("click", event => {
                    lista.splice(indice, 1)
                    localStorage.setItem("lista", JSON.stringify(lista))
                    carregarLista();
                })

                editar.addEventListener("click", event => {
                    const inputNome = document.createElement("input");
                    const inputTelefone = document.createElement("input");
                    const btnEnviar = document.createElement("button");

                    inputNome.placeholder = `Digite o novo nome`;
                    inputTelefone.placeholder = `Digite o novo telefone`;
                    btnEnviar.textContent = "Enviar"

                    li.appendChild(inputNome);
                    li.appendChild(inputTelefone);
                    li.appendChild(btnEnviar);

                    btnEnviar.addEventListener("click", event => {
                        const editarContato = {
                            nome: inputNome.value,
                            telefone: inputTelefone.value
                        }

                        lista[indice] = editarContato;
                        localStorage.setItem("lista", JSON.stringify(lista));

                        carregarLista();
                    })
                })

                li.appendChild(editar);
                li.appendChild(excluir);
                list.appendChild(li);
            })
        }
        carregarLista();
    </script>
</body>

</html>
