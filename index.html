<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Estoque</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <div class="formulario">
            <h2>Controle de Estoque</h2>
            <form class="form">
                <label for="produto">Produto:</label>
                <input type="text" name="produto" placeholder="Digite o nome do produto" required>
                <label for="preco">Preço:</label>
                <input type="number" name="preco" step="0.01" placeholder="Digite o valor do produto" required>
                <label for="quantidade">Quantidade:</label>
                <input type="number" name="quantidade" placeholder="Digite a quantidade do produto" required>
                <button type="submit">Enviar</button>
            </form>
        </div>
    </div>

    <div class="pesquisa"></div>

    <div class="container">
        <div class="lista">
            <div class="list"></div>
        </div>
    </div>

    <footer>

    <p class="linkedin-link">
        <a href="https://www.linkedin.com/in/agenor-s-rodrigues-b12473368/" target="_blank">
            <img src="https://img.shields.io/badge/LinkedIn-Agenor%20S.%20Rodrigues-0A66C2?style=for-the-badge&logo=linkedin&logoColor=white">
        </a>
    </p>

    <p class="github-link">
        <a href="https://github.com/agenorsrctt" target="_blank">
            <img src="https://img.shields.io/badge/GitHub-agenorsrctt-181717?style=for-the-badge&logo=github">
        </a>
    </p>

</footer>

    <script src="script.js"></script>
</body>

</html>
